        <h3>‘Fable’ — 라틴어 <code>fabula</code>(이야기)에서</h3>
        <div class="etymo"><b>Fable</b><span>← 라틴어 <code>fabula</code> ‘이야기·우화’ ← <code>fari</code> ‘말하다’</span></div>
        <p>영어 <strong>fable</strong>은 교훈을 담은 짧은 이야기(이솝 우화)를 뜻합니다. 어근은 ‘말하다’예요. 함께 발표된 <strong>Mythos</strong>도 그리스어 <code>mŷthos</code>(이야기·신화)에서 왔습니다 — 두 모델 모두 ‘이야기’ 계열의 이름이죠.</p>
        <div class="callout"><span class="callout__i">💡</span><p>왜 ‘이야기’일까요? 짧은 한 마디 답이 아니라 <strong>긴 호흡의 서사처럼 며칠에 걸친 작업을 끝까지 이어가는</strong> 모델이라는 점과 잘 맞아떨어집니다. 이름이 곧 성격의 힌트예요.</p></div>

        <p style="color:var(--fl-text-tertiary);font-size:13px">※ 어원 해석은 이해를 돕기 위한 학습용 연결이며, 공식 작명 의도와 다를 수 있습니다.</p>

      body: `
        <h3>핵심 7줄</h3>
        <ul>
          <li><strong>가장 어려운 문제에 쓰세요.</strong> Fable 5는 길고 복잡하고 모호한 엔드투엔드 작업(사람이 몇 시간~몇 주 걸리는 일)에 특히 강합니다. 쉬운 일로만 시험하면 역량을 과소평가하게 됩니다.</li>
          <li><strong>effort가 주 손잡이.</strong> 기본 <code>high</code>, 최고난도 <code>xhigh</code>, 일상은 <code>medium/low</code>. 낮은 effort도 종종 이전 모델의 <code>xhigh</code>를 능가합니다.</li>

        <h3>병렬 서브에이전트</h3>
        <div class="tp"><p>“독립적인 하위 작업은 서브에이전트에 위임하고, 그들이 도는 동안 계속 일하라. 서브에이전트가 길을 벗어나거나 맥락이 부족하면 개입하라.”
        <details><summary>프롬프트 원문(영어) — 복사용</summary><pre>Delegate independent subtasks to subagents and keep working while they run. Intervene
if a subagent goes off track or is missing relevant context.</pre></details></p></div>

        <h3>메모리 시스템 구축</h3>
        <div class="tp"><p>“교훈 하나를 파일 하나에, 맨 위 한 줄 요약과 함께 저장하라. 수정과 확인된 접근을 똑같이, 왜 중요한지까지 기록하라. 저장소·대화 기록이 이미 담은 건 저장하지 말고, 중복 대신 기존 노트를 갱신하고, 틀린 노트는 삭제하라.”
        <details><summary>프롬프트 원문(영어) — 복사용</summary><pre>Store one lesson per file with a one-line summary at the top. Record corrections and
confirmed approaches alike, including why they mattered. Don't save what the repo or
chat history already records; update an existing note rather than creating a duplicate;
delete notes that turn out to be wrong.</pre></details></p></div>

        <h3>드물게 발생하는 조기 중단</h3>
        <p>긴 세션에서 도구 호출 없이 “이제 X를 실행하겠습니다”로 끝내거나, 충분한 정보가 있는데 허락을 구하며 멈출 때가 있습니다. “계속하세요/처음부터 끝까지 진행하세요”면 충분합니다. 자율 파이프라인에는:</p>
        <div class="tp"><p>“너는 자율적으로 동작 중이다. 사용자는 실시간으로 보지 않으며 중간에 답할 수 없으니 ‘~할까요?’는 작업을 막는다. 원래 요청에서 따라오는 되돌릴 수 있는 작업은 묻지 말고 진행하라. 턴을 끝내기 전 마지막 문단을 점검하라 — 계획·분석·질문·다음 단계·약속(‘~하겠습니다’)이면, 지금 도구 호출로 그 일을 하라. 완료됐거나 사용자만 줄 수 있는 입력에 막혔을 때만 끝내라.”
        <details><summary>프롬프트 원문(영어) — 복사용</summary><pre>You are operating autonomously. The user is not watching in real time and cannot answer
questions mid-task, so asking "Want me to…?" or "Shall I…?" will block the work. For
reversible actions that follow from the original request, proceed without asking.
Offering follow-ups after the task is done is fine; asking permission after already
discussing with the user before doing the work is not. Before ending your turn, check
your last paragraph. If it is a plan, an analysis, a question, a list of next steps, or
a promise about work you have not done ("I'll…", "let me know when…"), do that work now
with tool calls. End your turn only when the task is complete or you are blocked on
input only the user can provide.</pre></details></p></div>

        <h3>드물게 발생하는 컨텍스트 예산 우려</h3>
        <p>아주 긴 세션에서 새 세션을 제안하거나 작업을 축소할 수 있습니다(하네스가 남은 토큰을 표시할 때 잦음). 가능하면 토큰 카운트를 노출하지 말고, 표시해야 한다면 안심 문구를 더하세요.</p>
        <div class="tp"><p>“컨텍스트는 충분히 남아 있다. 컨텍스트 한계를 이유로 멈추거나 요약하거나 새 세션을 제안하지 마라. 작업을 계속하라.”
        <details><summary>프롬프트 원문(영어) — 복사용</summary><pre>You have ample context remaining. Do not stop, summarize, or suggest a new session on
account of context limits. Continue the work.</pre></details></p></div>

        <h3>요청뿐 아니라 ‘이유’ 제공</h3>
        <p>의도를 이해할 때 더 잘 동작합니다. 특히 장기 실행 에이전트에는 요청의 이유를 함께 주세요.</p>
        <div class="tp"><p>“나는 [더 큰 작업]을 [누구]를 위해 하고 있다. 그들에게는 [그 산출물이 가능하게 하는 것]이 필요하다. 이를 염두에 두고: [요청].”
        <details><summary>프롬프트 원문(영어) — 복사용</summary><pre>I'm working on [the larger task] for [who it's for]. They need [what the output
enables]. With that in mind: [request].</pre></details></p></div>

        <h3>사용자와 소통할 때의 가독성</h3>
        <div class="tp"><p>“도구 호출 사이의 간결한 약어는 괜찮다(소리 내 생각하는 것이니까). 마지막 요약은 다르다 — 그 과정을 못 본 독자를 위한 것이다. 결과를 한 문장으로 먼저, 그다음 필요한 한두 가지를 각각 새것처럼 설명하라. 작업용 약어·화살표 체인·직접 만든 라벨을 버리고 완전한 문장으로, 용어를 풀어서 써라. 짧음과 명확함 중 골라야 하면 명확함을 골라라.”
        <details><summary>프롬프트 원문(영어) — 복사용</summary><pre>When you write the summary at the end, drop the working shorthand. Write complete
sentences. Spell out terms. Don't use arrow chains, hyphen-stacked compounds, or labels
you made up earlier. Open with the outcome: one sentence on what happened or what you
found. Then the supporting detail. If you have to choose between short and clear, choose
clear.</pre></details></p></div>

        <h3>권장 스캐폴딩 변경</h3>
        <ul>
          <li><strong>난이도 최상단에서 시작</strong> — 이전보다 더 어려운 작업을 주고, 모델이 범위를 정하고 질문하고 실행하게 하세요.</li>
          <li><strong>자체 검증을 명시적으로</strong> — 새 컨텍스트의 검증자 서브에이전트가 자기 비평보다 낫습니다: “빌드하면서 [X] 간격으로 사양과 대조해 서브에이전트로 검증하라.”</li>
          <li><strong>기존 프롬프트·스킬 리팩토링</strong> — 이전 모델용 스킬은 너무 규범적이라 품질을 낮출 수 있습니다. 기본 성능이 더 나으면 과거 지시를 덜어내세요.</li>
          <li><strong>추론 재현을 지시하지 말 것</strong> — 내부 추론을 응답에 반복·전사하라는 지시는 <code>reasoning_extraction</code> 거부를 유발할 수 있습니다. 추론 가시성은 구조화된 thinking 블록으로 얻으세요.</li>
        </ul>

        <h3>더 읽기</h3>
        <ul>
          <li>모델 소개·가격·가용성: <a href="https://platform.claude.com/docs/ko/about-claude/models/introducing-claude-fable-5-and-claude-mythos-5" target="_blank" rel="noopener">Claude Fable 5 / Mythos 5 소개 ↗</a></li>
          <li>전 모델 공통 기법: <a href="https://platform.claude.com/docs/ko/build-with-claude/prompt-engineering/claude-prompting-best-practices" target="_blank" rel="noopener">프롬프트 작성 모범 사례 ↗</a></li>
        </ul>
        <p style="color:var(--fl-text-tertiary);font-size:12.5px">※ 학습용 한국어 번역본입니다. 표현은 이해를 돕기 위해 다듬었으며, 정확한 원문은 출처 링크를 확인하세요.</p>
      `
    }
  ]
};

(function () {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const d = LENS_DOC, m = d.meta, lenses = d.lenses;

  // 헤더
  document.getElementById("head").innerHTML = `
    <div class="lens__icon">${esc(m.icon)}</div>
    <span class="lens__eyebrow">📚 깊이 읽기 · 5가지 렌즈</span>
    <h1 class="lens__title">${esc(m.title)}</h1>
    <p class="lens__oneliner">${esc(m.oneliner)}</p>
    <div class="lens__source">
      <span>📄 출처 <a href="${esc(m.sourceUrl)}" target="_blank" rel="noopener">${esc(m.sourceTitle)} ↗</a></span>
      <span>🗓️ ${esc(m.fetched)}</span>
      <span>🏷️ ${m.tags.map(esc).join(" · ")}</span>
    </div>`;

  // 탭
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = lenses.map((l, i) => `
    <button class="lens-tab" role="tab" data-i="${i}" aria-selected="${i === 0}">${esc(l.icon)} ${esc(l.label)}</button>`).join("");

  const panelEl = document.getElementById("panel");
  function renderQuiz(items) {
    return items.map((it, qi) => `
      <div class="quiz-item">
        <p class="quiz-q"><span>Q${qi + 1}.</span>${esc(it.q)}</p>
        <div class="quiz-opts" data-answer="${it.answer}">
          ${it.options.map((o, oi) => `
            <button class="quiz-opt" type="button" data-oi="${oi}">
              <span class="quiz-opt__mark">${String.fromCharCode(65 + oi)}</span><span>${esc(o)}</span>
            </button>`).join("")}
        </div>
        <div class="quiz-explain"><b>해설.</b> ${esc(it.explain)}</div>
      </div>`).join("");
  }
  function render(i) {
    const l = lenses[i];
    panelEl.innerHTML = `
      ${l.hint ? `<div class="lens-panel__hint"><span>${esc(l.icon)}</span><span>${l.hint}</span></div>` : ""}
      ${l.kind === "quiz" ? renderQuiz(l.quiz) : `<div class="lens-prose">${l.body}</div>`}`;
    panelEl.className = "lens-panel";
  }
  tabsEl.addEventListener("click", (e) => {
    const b = e.target.closest(".lens-tab");
    if (!b) return;
    const i = +b.dataset.i;
    tabsEl.querySelectorAll(".lens-tab").forEach((t) => t.setAttribute("aria-selected", String(+t.dataset.i === i)));
    render(i);
  });
  render(0);

  // 퀴즈 채점 (위임)
  panelEl.addEventListener("click", (e) => {
    const opt = e.target.closest(".quiz-opt");
    if (!opt) return;
    const opts = opt.closest(".quiz-opts");
    if (opt.disabled) return;
    const answer = +opts.dataset.answer;
    const chosen = +opt.dataset.oi;
    opts.querySelectorAll(".quiz-opt").forEach((b) => {
      b.disabled = true;
      const oi = +b.dataset.oi;
      if (oi === answer) b.classList.add("quiz-opt--correct");
      if (oi === chosen && chosen !== answer) b.classList.add("quiz-opt--wrong");
    });
    const ex = opts.parentElement.querySelector(".quiz-explain");
    if (ex) ex.classList.add("open");
  });

  // 푸터
  document.getElementById("foot").innerHTML = `
    <footer class="lens__footer">
      <p>📚 <b>깊이 읽기</b> — 어려운 문서를 5가지 렌즈로 다시 읽는 학습 페이지. 원문을 대체하지 않으며, 정확한 내용은 출처를 확인하세요.</p>
      <p>Folio 디자인 시스템 기반 · 단일 HTML(외부 의존성 없음, 폰트 CDN 제외) · 학습 템플릿: doc-lenses 각색</p>
    </footer>`;
})();

/* 테마 — 기본 시스템 따름, 클릭 시 고정 */
(function () {
  const root = document.documentElement, body = document.body;
  const btn = document.getElementById("themeBtn");
  const mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
  const saved = () => { try { return localStorage.getItem("nl-theme"); } catch (e) { return null; } };
  const dark = () => { const s = saved(); return s === "dark" ? true : s === "light" ? false : (mq ? mq.matches : false); };
  const apply = () => body.classList.toggle("fl-dark", dark());
  btn.addEventListener("click", () => { const n = dark() ? "light" : "dark"; try { localStorage.setItem("nl-theme", n); } catch (e) {} root.dataset.nlTheme = n; apply(); });
  if (mq) mq.addEventListener("change", () => { if (!saved()) apply(); });
  apply();
})();
</script>
</body>
