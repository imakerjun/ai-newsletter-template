<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>깊이 읽기 — 어려운 AI 문서를 여러 렌즈로 다시 읽기</title>
<meta name="description" content="공부하고 싶지만 어려운 AI 문서를 어원·요약·비유·퀴즈·원문 5가지 렌즈로 재구성해 모아두는 학습 라이브러리." />

<script>
  (function () { try { var s = localStorage.getItem("nl-theme"); if (s) document.documentElement.dataset.nlTheme = s; } catch (e) {} })();
</script>

<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");

.folio, .folio * { box-sizing: border-box; }
.folio {
  --fl-font-sans: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
  font-family: var(--fl-font-sans); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  --fl-radius-sm: 4px; --fl-radius: 6px; --fl-radius-md: 8px; --fl-radius-lg: 12px;
  --fl-ease-out: cubic-bezier(0.16,1,0.3,1); --fl-dur-fast: 120ms; --fl-dur-normal: 180ms;
  --fl-bg: #ffffff; --fl-surface: #ffffff; --fl-surface-2: #f7f6f3; --fl-surface-3: #f1f0ec;
  --fl-hover: rgba(55,53,47,0.06); --fl-active: rgba(55,53,47,0.12);
  --fl-text: #37352f; --fl-text-secondary: #525049; --fl-text-tertiary: #787774; --fl-text-quaternary: #9b9a97;
  --fl-text-link: #2d6fc5;
  --fl-border-subtle: rgba(15,14,12,0.08); --fl-border: rgba(15,14,12,0.13);
  --fl-accent: #2d6fc5;
  --fl-tint-gray: #777570; --fl-tint-gray-bg: #f1f0ee;
  --fl-tint-purple: #6f4ec9; --fl-tint-purple-bg: #eae4f2;
  --fl-shadow-sm: 0 1px 3px rgba(15,14,12,0.06), 0 1px 2px rgba(15,14,12,0.04);
  --fl-shadow-md: 0 2px 4px rgba(15,14,12,0.04), 0 6px 16px rgba(15,14,12,0.08);
  color-scheme: light;
}
.fl-dark, .folio.fl-dark {
  --fl-bg: #191918; --fl-surface: #202020; --fl-surface-2: #1c1c1b; --fl-surface-3: #2a2a28;
  --fl-hover: rgba(255,253,248,0.055); --fl-active: rgba(255,253,248,0.13);
  --fl-text: #e9e7e2; --fl-text-secondary: #c2bfb7; --fl-text-tertiary: #908d85; --fl-text-quaternary: #6f6b62;
  --fl-text-link: #8aa9ff;
  --fl-border-subtle: rgba(255,253,248,0.07); --fl-border: rgba(255,253,248,0.12);
  --fl-accent: #8aa9ff;
  --fl-tint-gray: #b0aca5; --fl-tint-gray-bg: rgba(155,152,145,0.16);
  --fl-tint-purple: #b39bf5; --fl-tint-purple-bg: rgba(111,78,201,0.24);
  --fl-shadow-sm: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --fl-shadow-md: 0 2px 4px rgba(0,0,0,0.4), 0 6px 16px rgba(0,0,0,0.5);
  color-scheme: dark;
}

html, body { margin: 0; padding: 0; }
body { background: var(--fl-bg); color: var(--fl-text); font-family: var(--fl-font-sans); font-size: 14px; line-height: 1.6; transition: background var(--fl-dur-normal), color var(--fl-dur-normal); }
a { color: inherit; text-decoration: none; }

.topnav { position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 10px; padding: 9px 20px; background: color-mix(in srgb, var(--fl-bg) 86%, transparent); -webkit-backdrop-filter: saturate(1.5) blur(8px); backdrop-filter: saturate(1.5) blur(8px); border-bottom: 1px solid var(--fl-border-subtle); }
.topnav__brand { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--fl-text); }
.topnav__logo { width: 24px; height: 24px; border-radius: 6px; background: var(--fl-accent); color: var(--fl-bg); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; }
.topnav__spacer { flex: 1; }
.topnav__link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 11px; border-radius: var(--fl-radius-md); font-size: 13px; font-weight: 500; color: var(--fl-text-secondary); transition: background var(--fl-dur-fast), color var(--fl-dur-fast); }
.topnav__link:hover { background: var(--fl-hover); color: var(--fl-text); }
.topnav__link--active { background: var(--fl-active); color: var(--fl-text); }
.nl-theme { width: 34px; height: 34px; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; background: transparent; border: 1px solid var(--fl-border); border-radius: var(--fl-radius-md); color: var(--fl-text-secondary); cursor: pointer; transition: background var(--fl-dur-fast), color var(--fl-dur-fast); }
.nl-theme:hover { background: var(--fl-hover); color: var(--fl-text); }
.nl-theme svg { width: 17px; height: 17px; }
.nl-ico-sun, .nl-ico-moon { display: none; }
body:not(.fl-dark) .nl-ico-sun { display: block; }
body.fl-dark .nl-ico-moon { display: block; }

.lib { max-width: 720px; margin: 0 auto; padding: 28px 28px 120px; }
.lib__icon { font-size: 52px; line-height: 1; }
.lib__eyebrow { margin-top: 14px; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; color: var(--fl-tint-purple); background: var(--fl-tint-purple-bg); padding: 3px 10px; border-radius: 999px; }
.lib__title { font-size: 38px; font-weight: 800; line-height: 1.14; letter-spacing: -0.025em; margin: 14px 0 0; }
.lib__title b { color: var(--fl-accent); }
.lib__lead { font-size: 16px; line-height: 1.65; color: var(--fl-text-secondary); margin: 12px 0 0; max-width: 58ch; word-break: keep-all; }
.lib__meta { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 6px 18px; font-size: 12.5px; color: var(--fl-text-tertiary); padding-bottom: 22px; border-bottom: 1px solid var(--fl-border-subtle); }
.lib__meta b { color: var(--fl-text-secondary); font-weight: 600; }

.lib__label { margin: 26px 0 14px; font-size: 12px; font-weight: 700; letter-spacing: 0.04em; color: var(--fl-text-tertiary); display: flex; align-items: center; gap: 8px; }
.lib__label::after { content: ""; flex: 1; height: 1px; background: var(--fl-border-subtle); }

.doc-grid { display: grid; gap: 12px; }
.doc-card { display: flex; gap: 14px; padding: 16px 18px; background: var(--fl-surface); border: 1px solid var(--fl-border-subtle); border-radius: var(--fl-radius-lg); transition: border-color var(--fl-dur-fast), box-shadow var(--fl-dur-fast), transform var(--fl-dur-fast); }
.doc-card:hover { border-color: var(--fl-border); box-shadow: var(--fl-shadow-md); transform: translateY(-2px); }
/* 책 일러스트 — 깊이 읽기 결과물 카드 아이콘 */
.doc-card__icon { flex-shrink: 0; position: relative; width: 48px; height: 60px; }
.doc-card__icon .book {
  position: absolute; inset: 0;
  border-radius: 3px 6px 6px 3px;
  background: linear-gradient(135deg, var(--fl-tint-purple-bg), var(--fl-surface));
  border: 1px solid var(--fl-border); border-left: 6px solid var(--fl-tint-purple);
  box-shadow: var(--fl-shadow-sm);
  display: flex; align-items: center; justify-content: center;
  transition: transform var(--fl-dur-fast);
}
.doc-card:hover .doc-card__icon .book { transform: translateY(-2px) rotate(-2deg); }
.doc-card__icon .book::before { /* 표지 위 가름선 */
  content: ""; position: absolute; left: 9px; right: 7px; top: 9px; height: 1px;
  background: var(--fl-border); opacity: 0.6;
}
.doc-card__icon .book::after { /* 책장(페이지) 가장자리 */
  content: ""; position: absolute; right: -3px; top: 4px; bottom: 4px; width: 3px;
  background: var(--fl-surface); border: 1px solid var(--fl-border-subtle); border-left: none;
  border-radius: 0 2px 2px 0;
}
.doc-card__icon .book__art { font-size: 21px; line-height: 1; margin-top: 4px; }
.doc-card__body { flex: 1; min-width: 0; }
.doc-card__title { font-size: 16px; font-weight: 700; line-height: 1.4; letter-spacing: -0.008em; color: var(--fl-text); word-break: keep-all; }
.doc-card__title .demo { font-size: 10px; font-weight: 600; color: var(--fl-text-quaternary); background: var(--fl-surface-3); padding: 2px 6px; border-radius: 999px; margin-left: 6px; vertical-align: middle; }
.doc-card__desc { margin: 6px 0 0; font-size: 13.5px; line-height: 1.6; color: var(--fl-text-secondary); word-break: keep-all; }
.doc-card__lenses { margin: 10px 0 0; font-size: 13px; letter-spacing: 2px; }
.doc-card__meta { margin: 8px 0 0; display: flex; flex-wrap: wrap; gap: 4px 12px; font-size: 12px; color: var(--fl-text-tertiary); }
.doc-card__meta a { color: var(--fl-text-link); }

.lib__how { margin-top: 30px; padding: 16px 18px; background: var(--fl-surface-2); border: 1px solid var(--fl-border-subtle); border-radius: var(--fl-radius-md); font-size: 13.5px; line-height: 1.7; color: var(--fl-text-secondary); }
.lib__how b { color: var(--fl-text); }
.lib__how code { font-family: ui-monospace, Menlo, monospace; font-size: 0.9em; background: var(--fl-surface-3); padding: 1px 5px; border-radius: 4px; }

.lib__footer { margin-top: 40px; padding-top: 22px; border-top: 1px solid var(--fl-border-subtle); color: var(--fl-text-tertiary); font-size: 12.5px; line-height: 1.7; }

@media (max-width: 600px) {
  .lib { padding: 20px 16px 96px; }
  .topnav { padding: 8px 14px; gap: 8px; }
  .topnav__brand-t { display: none; }
  .lib__title { font-size: 28px; }
}
@media (prefers-reduced-motion: reduce) { body { transition: none; } }
</style>
</head>

<body class="folio">

<header class="topnav">
  <a class="topnav__brand" href="../index.html"><span class="topnav__logo">준</span><span class="topnav__brand-t">메이커준의 AI 학습 허브</span></a>
  <span class="topnav__spacer"></span>
  <a class="topnav__link" href="../index.html">📰 뉴스레터</a>
  <a class="topnav__link topnav__link--active" href="index.html">📚 깊이 읽기</a>
  <button class="nl-theme" id="themeBtn" type="button" aria-label="라이트/다크 전환" title="라이트/다크 전환">
    <svg class="nl-ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
    <svg class="nl-ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
</header>

<main class="lib" id="lib"></main>

<script>
/* ============================================================================
   깊이 읽기 라이브러리 — 어려운 문서를 렌즈로 재구성한 학습 문서 목록.
   새 문서를 만들면 docs 배열 맨 앞에 항목을 추가한다.
   ============================================================================ */
const LIBRARY = {
  meta: {
    icon: "📚",
    title: ["깊이 ", "읽기"],
    lead: "공부하고 싶지만 어렵게 느껴지는 AI 문서·공식문서를, 내가 이해하기 쉬운 여러 ‘렌즈’로 재구성해 모아둡니다. 한 번 읽고 끝이 아니라, 형식을 바꿔 다시 방문하며 익힙니다.",
    lensSet: "🔤 어원 · ⚡ 한입요약 · 🧒 비유로 쉽게 · 🧪 퀴즈 · 📄 원문"
  },
  docs: [
    {
      "icon": "🪄",
      "title": "Claude Fable 5 프롬프트 작성",
      "demo": true,
      "desc": "(예시) 어려운 공식문서를 어원·요약·비유·퀴즈·전문 5렌즈로. 새 문서를 만들면 교체돼요.",
      "lenses": [
        "🔤",
        "⚡",
        "🧒",
        "🧪",
        "📄"
      ],
      "source": "Anthropic 공식문서",
      "sourceUrl": "https://platform.claude.com/docs/ko/build-with-claude/prompt-engineering/prompting-claude-fable-5",
      "date": "2026-06-18",
      "href": "prompting-fable-5.html"
    }
  ]
};

(function () {
  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
  const m = LIBRARY.meta, docs = LIBRARY.docs;

  const cards = docs.length ? docs.map((doc) => `
    <a class="doc-card" href="${esc(doc.href)}" target="_blank" rel="noopener">
      <div class="doc-card__icon"><span class="book"><span class="book__art">${esc(doc.icon)}</span></span></div>
      <div class="doc-card__body">
        <div class="doc-card__title">${esc(doc.title)}${doc.demo ? `<span class="demo">예시</span>` : ""}</div>
        <div class="doc-card__desc">${esc(doc.desc)}</div>
        <div class="doc-card__lenses">${(doc.lenses || []).map(esc).join(" ")}</div>
        <div class="doc-card__meta">
          <span>📄 ${esc(doc.source)}</span>
          <span>🗓️ ${esc(doc.date)}</span>
          <span>🔍 ${(doc.lenses || []).length}가지 렌즈</span>
        </div>
      </div>
    </a>`).join("") : `<div class="lib__how">아직 등록된 학습 문서가 없습니다.</div>`;

  document.getElementById("lib").innerHTML = `
    <div class="lib__icon">${esc(m.icon)}</div>
    <span class="lib__eyebrow">📚 깊이 읽기</span>
    <h1 class="lib__title">${esc(m.title[0])}<b>${esc(m.title[1])}</b></h1>
    <p class="lib__lead">${esc(m.lead)}</p>
    <div class="lib__meta">
      <span>🔍 렌즈 <b>${esc(m.lensSet)}</b></span>
    </div>

    <div class="lib__label">학습 문서 (${docs.length})</div>
    <div class="doc-grid">${cards}</div>

    <div class="lib__how">
      💡 <b>새 문서 추가하기</b> — Claude에게 “이 링크를 <code>깊이 읽기</code> 렌즈 문서로 만들어줘”라고 하면,
      <code>learn/_TEMPLATE_lens.html</code>을 복제해 어원·요약·비유·퀴즈·원문 렌즈를 채우고 이 목록에 추가합니다.
      자동 뉴스레터와 함께 <b>내가 공부한 것</b>도 같은 허브에 쌓입니다.
    </div>

    <footer class="lib__footer">
      <p>📚 깊이 읽기 · 학습 템플릿 <a href="https://github.com/imakerjun/learning-templates/tree/main/doc-lenses" target="_blank" rel="noopener" style="color:var(--fl-text-link)">doc-lenses</a> 각색 · Folio 디자인 시스템 기반</p>
    </footer>`;
})();

(function () {
  const root = document.documentElement, body = document.body;
  const btn = document.getElementById("themeBtn");
  const mq = window.matchMedia ? window.matchMedia("(prefers-color-scheme: dark)") : null;
  const saved = () => { try { return localStorage.getItem("nl-theme"); } catch (e) { return null; } };
  const dark = () => { const s = saved(); return s === "dark" ? true : s === "light" ? false : (mq ? mq.matches : false); };
  const apply = () => body.classList.toggle("fl-dark", dark());
  btn.addEventListener("click", () => { const n = dark() ? "light" : "dark"; try { localStorage.setItem("nl-theme", n); } catch (e) {} root.dataset.nlTheme = n; apply(); });
  if (mq) mq.addEventListener("change", () => { if (!saved()) apply(); });
  apply();
})();
</script>
</body>
</html>
